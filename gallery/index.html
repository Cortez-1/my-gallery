<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人画廊</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --bg-color: #f4f4f9;
            --card-bg: #ffffff;
            --text-color: #333;
            --secondary-text: #666;
        }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 { margin: 0; color: var(--primary-color); }
        p { color: var(--secondary-text); }

        /* 画廊网格布局 */
        #gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
            width: 100%;
            max-width: 1200px;
        }

        /* 卡片样式 */
        .card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.12);
        }

        /* 媒体区域 (图片/视频) */
        .media-container {
            width: 100%;
            height: 250px;
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .media-container img,
        .media-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* 文字介绍区域 */
        .content {
            padding: 20px;
        }

        .date {
            font-size: 0.8rem;
            color: #999;
            margin-bottom: 8px;
            display: block;
        }

        .title {
            font-size: 1.2rem;
            font-weight: bold;
            margin: 0 0 10px 0;
            color: var(--text-color);
        }

        .description {
            font-size: 0.95rem;
            line-height: 1.6;
            color: var(--secondary-text);
            margin: 0;
            white-space: pre-wrap; /* 保留换行符 */
        }

        .loading { text-align: center; color: #888; margin-top: 50px; }
    </style>
</head>
<body>

    <header>
        <h1>展示墙</h1>
    </header>

    <div id="gallery">
        <div class="loading">正在加载内容...</div>
    </div>

    <script>
        async function loadGallery() {
            const gallery = document.getElementById('gallery');

            try {
                // 读取后台生成的 JSON 文件
                const response = await fetch('/gallery.json');

                // 如果文件不存在（第一次使用），抛出错误
                if (!response.ok) throw new Error('数据文件未找到');

                const data = await response.json();
                gallery.innerHTML = ''; // 清空加载提示

                // 确保 items 存在
                const items = data.items || [];

                // 倒序排列，最新的在最前面
                items.reverse().forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'card';

                    let mediaHtml = '';
                    // 判断是图片还是视频
                    if (item.type === 'image') {
                        mediaHtml = `<img src="${item.file}" alt="${item.title}">`;
                    } else if (item.type === 'video') {
                        mediaHtml = `<video controls src="${item.file}"></video>`;
                    }

                    // 格式化日期
                    const dateStr = item.date ? new Date(item.date).toLocaleDateString() : '';

                    card.innerHTML = `
                        <div class="media-container">
                            ${mediaHtml}
                        </div>
                        <div class="content">
                            <span class="date">${dateStr}</span>
                            <h3 class="title">${item.title}</h3>
                            <p class="description">${item.description}</p>
                        </div>
                    `;
                    gallery.appendChild(card);
                });

            } catch (error) {
                console.error(error);
                gallery.innerHTML = '<div class="loading">暂无内容，请先登录后台发布。</div>';
            }
        }

        loadGallery();
    </script>
</body>
</html>
