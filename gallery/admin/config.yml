backend:
  name: git-gateway
  branch: main

media_folder: "uploads"
public_folder: "/uploads"

# 定义一个单独的数据文件，所有作品都存在这里
files:
  - name: "gallery_data"
    label: "画廊内容管理"
    file: "gallery.json"
    format: json
    fields:
      - label: "作品列表"
        name: "items"
        widget: "list"
        fields:
          - { label: "类型", name: "type", widget: "select", options: ["image", "video"] }
          - { label: "文件", name: "file", widget: "file" }
          - { label: "标题", name: "title", widget: "string" }
          - { label: "日期", name: "date", widget: "datetime" }
          - { label: "详细介绍", name: "description", widget: "text" }