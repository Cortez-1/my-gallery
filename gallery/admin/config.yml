backend:
  name: git-gateway
  branch: main # 通常是 main 或 master

# 媒体文件（图片/视频）上传到哪里
media_folder: "gallery/uploads" 
# 前台网页访问这些文件的路径
public_folder: "/gallery/uploads"

collections:
  - name: "gallery_data"
    label: "图片与视频库"
    # 这里我们把数据存在 gallery 文件夹下的 data.json 里
    # 这样不会干扰你原来的主页面代码
    file: "gallery/index.html" 
    label_singular: "媒体项"
    fields:
      - label: "作品列表"
        name: "items"
        widget: "list"
        fields:
          - {label: "标题", name: "title", widget: "string"}
          - {label: "描述", name: "desc", widget: "text"}
          - {label: "媒体类型", name: "type", widget: "select", options: ["image", "video"]}
          - {label: "选择文件", name: "file", widget: "file", media_library: {config: {max_file_size: 50000000}}}
